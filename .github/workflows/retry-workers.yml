name: Retry notification and webhook workers

on:
  schedule:
    # Every 10 minutes. GitHub Actions cron timing isn't exact under load,
    # so treat this as "checked at least every ~10-15 minutes", not a
    # precise SLA -- same caveat as uptime-check.yml.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  run-workers:
    runs-on: ubuntu-latest
    steps:
      - name: Run one batch of queued/retryable notifications and webhooks
        run: |
          response=$(curl -s -o /tmp/workers-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_WORKER_SECRET }}" \
            https://telecomcompliance.uk/api/internal/run-workers)
          echo "HTTP status: $response"
          cat /tmp/workers-response.json
          echo ""
          if [ "$response" != "200" ]; then
            echo "::error::Worker run failed with HTTP $response"
            exit 1
          fi
