services:
  voice-agent:
    build:
      context: ..
      dockerfile: voice-agent-service/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - VOICE_AGENT_DOMAIN=${VOICE_AGENT_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - voice-agent

volumes:
  caddy_data:
  caddy_config:
